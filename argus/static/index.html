<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Argus OSINT Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--card:rgba(26,26,46,.75);--card-solid:#1a1a2e;--accent:#e94560;--accent2:#0f3460;--border:#16213e;--text:#e0e0e0;--muted:#888;--success:#00d26a;--warn:#f5a623;--danger:#e94560;--sidebar-w:240px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--card);backdrop-filter:blur(20px);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform .3s}
.sidebar .logo{padding:20px;font-size:1.4rem;font-weight:700;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar .logo span{color:var(--accent)}
.nav{flex:1;padding:10px 0}
.nav a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;transition:all .2s;border-left:3px solid transparent}
.nav a:hover,.nav a.active{color:var(--text);background:rgba(233,69,96,.08);border-left-color:var(--accent)}
.nav a i{width:20px;text-align:center;font-size:1rem}
.main{margin-left:var(--sidebar-w);padding:24px;min-height:100vh;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.topbar h1{font-size:1.5rem;font-weight:600}
.topbar .user-info{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--muted)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:12px;padding:20px;animation:fadeIn .4s}
.stat-card .icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:12px}
.stat-card .value{font-size:1.8rem;font-weight:700}
.stat-card .label{font-size:.8rem;color:var(--muted);margin-top:4px}
.card{background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;animation:fadeIn .4s}
.card h3{font-size:1rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:500}
.badge-success{background:rgba(0,210,106,.15);color:var(--success)}.badge-warn{background:rgba(245,166,35,.15);color:var(--warn)}
.badge-danger{background:rgba(233,69,96,.15);color:var(--danger)}.badge-info{background:rgba(15,52,96,.3);color:#6ea8fe}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 12px;border-bottom:1px solid rgba(22,33,62,.5)}
tr:hover td{background:rgba(15,52,96,.1)}
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card-solid);color:var(--text);cursor:pointer;font-size:.85rem;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--accent);color:var(--accent)}.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#d13a54;border-color:#d13a54}.btn-sm{padding:5px 10px;font-size:.78rem}
.btn-danger{border-color:var(--danger);color:var(--danger)}.btn-danger:hover{background:var(--danger);color:#fff}
input,select{padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.9rem;font-family:inherit;outline:none;transition:border .2s}
input:focus,select:focus{border-color:var(--accent)}
.form-row{display:flex;gap:12px;margin-bottom:16px;align-items:center}
.search-box{flex:1;position:relative}
.search-box input{width:100%;padding-left:40px}
.search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.evidence-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:16px}
.evidence-card{background:var(--card-solid);border:1px solid var(--border);border-radius:10px;padding:16px;animation:fadeIn .4s}
.evidence-card h4{font-size:.9rem;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.evidence-card .kv{display:flex;justify-content:space-between;padding:4px 0;font-size:.82rem;border-bottom:1px solid rgba(22,33,62,.3)}
.evidence-card .kv .k{color:var(--muted)}.evidence-card .kv .v{text-align:right;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plugin-group{margin-bottom:16px}
.plugin-group h4{font-size:.95rem;font-weight:600;padding:10px 0;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--accent2);border-bottom:1px solid var(--border)}
.plugin-group h4 i{transition:transform .2s}.plugin-group.open h4 i{transform:rotate(90deg)}
.plugin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:12px 0;display:none}
.plugin-group.open .plugin-grid{display:grid}
.plugin-card{background:var(--card-solid);border:1px solid var(--border);border-radius:8px;padding:14px}
.plugin-card h5{font-size:.85rem;font-weight:600;margin-bottom:6px}.plugin-card p{font-size:.78rem;color:var(--muted);line-height:1.4}
.plugin-card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;text-align:center;animation:fadeIn .4s}
.login-box h2{margin-bottom:8px}.login-box .subtitle{color:var(--muted);font-size:.9rem;margin-bottom:24px}
.login-box input{width:100%;margin-bottom:16px}.login-box .btn{width:100%;justify-content:center}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:.85rem;z-index:999;animation:fadeIn .3s;border:1px solid var(--border);background:var(--card-solid)}
.toast.success{border-color:var(--success);color:var(--success)}.toast.error{border-color:var(--danger);color:var(--danger)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--muted)}.empty i{font-size:2rem;margin-bottom:12px;display:block}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;font-size:1.3rem;color:var(--text);cursor:pointer;background:var(--card);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;align-items:center;justify-content:center}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
.main{margin-left:0;padding:16px}.hamburger{display:flex}
.stats{grid-template-columns:repeat(2,1fr)}.evidence-grid{grid-template-columns:1fr}
}
.view{display:none}.view.active{display:block}
.filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar select{padding:8px 12px;font-size:.82rem}
.filter-bar label{font-size:.82rem;color:var(--muted)}
.ai-report{background:rgba(15,52,96,.3);border:1px solid var(--accent2);border-radius:10px;padding:20px;margin-bottom:16px;white-space:pre-wrap;font-size:.88rem;line-height:1.7;max-height:400px;overflow-y:auto}
.ai-report h4{color:var(--accent);margin-bottom:10px}
.actions-cell{display:flex;gap:6px}
</style>
</head>
<body>
<div class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></div>
<div id="app"></div>
<div id="toast-container"></div>

<script>
const API = window.location.origin + '/api/v1';
let token = localStorage.getItem('argus_token');
let currentUser = null;

function api(method, path, body) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  return fetch(API + path, opts).then(r => {
    if (r.status === 401) { localStorage.removeItem('argus_token'); token = null; render(); throw new Error('Unauthorized'); }
    return r.json().catch(() => ({}));
  });
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

async function render() {
  if (!token) { renderLogin(); return; }
  try { currentUser = await api('GET', '/users/me'); } catch { currentUser = null; }
  if (!currentUser) { renderLogin(); return; }
  renderApp();
}

function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-screen">
      <div class="login-box">
        <div style="font-size:2.5rem;margin-bottom:8px">🦅</div>
        <h2>Argus OSINT</h2>
        <p class="subtitle">Enter your Telegram ID to authenticate</p>
        <input type="number" id="login-tid" placeholder="Your Telegram ID" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn btn-primary" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Authenticate</button>
      </div>
    </div>`;
}

async function doLogin() {
  const tid = document.getElementById('login-tid').value;
  if (!tid) return;
  try {
    const data = await fetch(API + '/users/auth/telegram', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telegram_id: parseInt(tid) })
    }).then(r => r.json());
    if (data.access_token) { token = data.access_token; localStorage.setItem('argus_token', token); toast('Authenticated!'); render(); }
    else toast('Authentication failed', 'error');
  } catch { toast('Connection error', 'error'); }
}

function logout() { localStorage.removeItem('argus_token'); token = null; render(); }

function renderApp() {
  document.getElementById('app').innerHTML = `
    <div class="sidebar" id="sidebar">
      <div class="logo">🦅 <span>Argus</span></div>
      <nav class="nav">
        <a href="#home" class="nav-link active" data-view="home"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="#investigations" class="nav-link" data-view="investigations"><i class="fas fa-search"></i> Investigations</a>
        <a href="#monitors" class="nav-link" data-view="monitors"><i class="fas fa-bell"></i> Monitors</a>
        <a href="#plugins" class="nav-link" data-view="plugins"><i class="fas fa-puzzle-piece"></i> Plugins</a>
        <a href="#settings" class="nav-link" data-view="settings"><i class="fas fa-cog"></i> Settings</a>
      </nav>
      <div style="padding:16px 20px;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted)">
        <div>${currentUser.username || 'User'} (ID: ${currentUser.telegram_id})</div>
        <a href="#" onclick="logout();return false" style="color:var(--accent);text-decoration:none;margin-top:4px;display:block"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
    <div class="main"><div id="view-content"><div class="spinner" style="margin:40px auto"></div></div></div>`;
  
  document.querySelectorAll('.nav-link').forEach(a => {
    a.addEventListener('click', e => {
      document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
      a.classList.add('active');
      document.querySelector('.sidebar').classList.remove('open');
    });
  });
  router();
}

const views = {};
function registerView(name, fn) { views[name] = fn; }

registerView('home', async (el) => {
  let invs = [], mons = [];
  try { invs = await api('GET', '/investigations?limit=10'); } catch {}
  try { mons = await api('GET', '/monitors'); } catch {}
  const completed = invs.filter ? invs.filter(i => i.status === 'completed').length : 0;
  const threats = invs.filter ? invs.filter(i => (i.summary || '').includes('🚨')).length : 0;
  el.innerHTML = `
    <div class="topbar"><h1><i class="fas fa-chart-line" style="color:var(--accent)"></i> Dashboard</h1></div>
    <div class="stats">
      <div class="stat-card"><div class="icon" style="background:rgba(233,69,96,.15);color:var(--accent)"><i class="fas fa-search"></i></div><div class="value">${Array.isArray(invs) ? invs.length : 0}</div><div class="label">Total Investigations</div></div>
      <div class="stat-card"><div class="icon" style="background:rgba(0,210,106,.15);color:var(--success)"><i class="fas fa-bell"></i></div><div class="value">${Array.isArray(mons) ? mons.filter(m => m.active).length : 0}</div><div class="label">Active Monitors</div></div>
      <div class="stat-card"><div class="icon" style="background:rgba(15,52,96,.3);color:#6ea8fe"><i class="fas fa-check-circle"></i></div><div class="value">${completed}</div><div class="label">Completed</div></div>
      <div class="stat-card"><div class="icon" style="background:rgba(245,166,35,.15);color:var(--warn)"><i class="fas fa-exclamation-triangle"></i></div><div class="value">${threats}</div><div class="label">Threat Alerts</div></div>
    </div>
    <div class="card"><h3><i class="fas fa-bolt" style="color:var(--accent)"></i> Quick Investigate</h3>
      <div class="form-row"><div class="search-box"><i class="fas fa-crosshairs"></i><input id="quick-target" placeholder="Enter target: domain, IP, email, username, phone..."></div>
      <button class="btn btn-primary" onclick="quickInvestigate()"><i class="fas fa-search"></i> Investigate</button></div>
    </div>
    <div class="card"><h3><i class="fas fa-clock" style="color:var(--accent2)"></i> Recent Investigations</h3>
      <div class="table-wrap"><table><thead><tr><th>Target</th><th>Type</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>
      ${(Array.isArray(invs) ? invs.slice(0, 10) : []).map(i => `<tr>
        <td style="font-weight:500">${i.target}</td><td><span class="badge badge-info">${i.target_type}</span></td>
        <td><span class="badge badge-${i.status === 'completed' ? 'success' : i.status === 'failed' ? 'danger' : 'warn'}">${i.status}</span></td>
        <td style="color:var(--muted);font-size:.8rem">${(i.created_at || '').slice(0, 19)}</td>
        <td class="actions-cell"><button class="btn btn-sm" onclick="location.hash='#investigation/${i.id}'"><i class="fas fa-eye"></i></button></td>
      </tr>`).join('')}
      </tbody></table></div>
    </div>`;
});

async function quickInvestigate() {
  const target = document.getElementById('quick-target').value.trim();
  if (!target) return;
  toast('Investigation started for ' + target);
  try { await api('POST', '/investigations', { target }); } catch {}
  setTimeout(() => router(), 2000);
}

registerView('investigations', async (el) => {
  el.innerHTML = '<div class="topbar"><h1><i class="fas fa-search" style="color:var(--accent)"></i> Investigations</h1></div><div class="filter-bar"><label>Status:</label><select id="filter-status" onchange="loadInvestigations()"><option value="">All</option><option value="pending">Pending</option><option value="running">Running</option><option value="completed">Completed</option><option value="failed">Failed</option></select></div><div id="inv-table"><div class="spinner" style="margin:40px auto"></div></div>';
  window.loadInvestigations = async () => {
    const invs = await api('GET', '/investigations?limit=50');
    const status = document.getElementById('filter-status')?.value || '';
    const filtered = Array.isArray(invs) ? (status ? invs.filter(i => i.status === status) : invs) : [];
    document.getElementById('inv-table').innerHTML = filtered.length ? `<div class="table-wrap"><table><thead><tr><th>Target</th><th>Type</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>${filtered.map(i => `<tr><td style="font-weight:500">${i.target}</td><td><span class="badge badge-info">${i.target_type}</span></td><td><span class="badge badge-${i.status==='completed'?'success':i.status==='failed'?'danger':'warn'}">${i.status}</span></td><td style="color:var(--muted);font-size:.8rem">${(i.created_at||'').slice(0,19)}</td><td class="actions-cell"><button class="btn btn-sm" onclick="location.hash='#investigation/${i.id}'"><i class="fas fa-eye"></i> View</button></td></tr>`).join('')}</tbody></table></div>` : '<div class="empty"><i class="fas fa-inbox"></i>No investigations found</div>';
  };
  loadInvestigations();
});

registerView('investigation', async (el) => {
  const id = location.hash.split('/')[2];
  if (!id) { el.innerHTML = '<div class="empty"><i class="fas fa-question-circle"></i> Invalid investigation ID</div>'; return; }
  el.innerHTML = '<div class="topbar"><h1><div class="spinner" style="width:16px;height:16px"></div> Loading investigation...</h1></div>';
  try {
    const inv = await api('GET', `/investigations/${id}`);
    const statusCls = inv.status === 'completed' ? 'success' : inv.status === 'failed' ? 'danger' : 'warn';
    const evidence = inv.evidence || [];
    const evidenceCards = evidence.map(e => {
      const d = e.data || {};
      const entries = Object.entries(d).filter(([k, v]) => typeof v !== 'object' || v === null).slice(0, 8);
      return `<div class="evidence-card"><h4><i class="fas fa-cube"></i> ${e.plugin_name}</h4>${entries.map(([k, v]) => `<div class="kv"><span class="k">${k}</span><span class="v">${String(v).slice(0, 80)}</span></div>`).join('')}${typeof d === 'object' && Object.values(d).some(v => typeof v === 'object' && v) ? '<div style="margin-top:8px;font-size:.78rem;color:var(--muted)">+ more data available</div>' : ''}</div>`;
    }).join('');
    el.innerHTML = `
      <div class="topbar"><h1><button class="btn btn-sm" onclick="history.back()" style="margin-right:8px"><i class="fas fa-arrow-left"></i></button> ${inv.target}</h1></div>
      <div class="stats" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
        <div class="stat-card"><div class="label">Type</div><div><span class="badge badge-info">${inv.target_type}</span></div></div>
        <div class="stat-card"><div class="label">Status</div><div><span class="badge badge-${statusCls}">${inv.status}</span></div></div>
        <div class="stat-card"><div class="label">Created</div><div style="font-size:.85rem">${(inv.created_at||'').slice(0,19)}</div></div>
        <div class="stat-card"><div class="label">Evidence</div><div style="font-size:1.1rem;font-weight:600">${evidence.length} plugins</div></div>
      </div>
      <div class="form-row"><button class="btn" onclick="reinvestigate(${id})"><i class="fas fa-redo"></i> Re-investigate</button><button class="btn" onclick="aiAnalyze(${id})"><i class="fas fa-robot"></i> AI Report</button></div>
      <div id="ai-report-slot"></div>
      <div class="card"><h3><i class="fas fa-layer-group" style="color:var(--accent)"></i> Evidence (${evidence.length})</h3>
        <div class="evidence-grid">${evidenceCards || '<div class="empty"><i class="fas fa-puzzle-piece"></i> No evidence collected</div>'}</div>
      </div>`;
  } catch { el.innerHTML = '<div class="empty"><i class="fas fa-exclamation-circle"></i> Failed to load investigation</div>'; }
});

async function reinvestigate(id) { toast('Re-investigating...'); try { await api('POST', `/investigations`, { target: 'reinvestigate' }); } catch {} setTimeout(() => router(), 2000); }
async function aiAnalyze(id) { toast('Generating AI report...'); try { await api('POST', `/investigations/${id}/analyze`); setTimeout(() => router(), 3000); } catch { toast('AI analysis failed', 'error'); } }

registerView('monitors', async (el) => {
  el.innerHTML = `<div class="topbar"><h1><i class="fas fa-bell" style="color:var(--accent)"></i> Monitors</h1></div>
    <div class="card"><h3><i class="fas fa-plus-circle" style="color:var(--success)"></i> Create Monitor</h3>
      <div class="form-row"><input id="mon-target" placeholder="Target (domain, IP, email...)" style="flex:1"><select id="mon-schedule"><option value="hourly">Hourly</option><option value="daily" selected>Daily</option><option value="weekly">Weekly</option></select><button class="btn btn-primary" onclick="createMonitor()"><i class="fas fa-plus"></i> Create</button></div>
    </div><div id="mon-list"><div class="spinner" style="margin:40px auto"></div></div>`;
  loadMonitors();
  window.loadMonitors = async () => {
    const mons = await api('GET', '/monitors');
    const list = Array.isArray(mons) ? mons : [];
    document.getElementById('mon-list').innerHTML = list.length ? `<div class="table-wrap"><table><thead><tr><th>Target</th><th>Type</th><th>Schedule</th><th>Status</th><th>Changes</th><th>Last Checked</th><th>Actions</th></tr></thead><tbody>${list.map(m => `<tr><td style="font-weight:500">${m.target}</td><td><span class="badge badge-info">${m.target_type}</span></td><td>${m.schedule}</td><td><span class="badge ${m.active ? 'badge-success' : 'badge-warn'}">${m.active ? 'Active' : 'Paused'}</span></td><td>${m.change_count || 0}</td><td style="color:var(--muted);font-size:.8rem">${(m.last_checked||'Never').slice ? m.last_checked.slice(0,16) : 'Never'}</td><td class="actions-cell"><button class="btn btn-sm" onclick="toggleMonitor(${m.id},${!m.active})">${m.active ? '⏸' : '▶'}</button><button class="btn btn-sm btn-danger" onclick="deleteMonitor(${m.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table></div>` : '<div class="empty"><i class="fas fa-bell-slash"></i> No monitors configured</div>';
  };
});

async function createMonitor() {
  const target = document.getElementById('mon-target').value.trim();
  const schedule = document.getElementById('mon-schedule').value;
  if (!target) return;
  toast('Creating monitor...');
  try { await api('POST', '/monitors', { target, schedule, telegram_chat_id: 0 }); toast('Monitor created!'); } catch { toast('Failed to create monitor', 'error'); }
  setTimeout(() => loadMonitors(), 1000);
}
async function toggleMonitor(id, active) { try { await api('PATCH', `/monitors/${id}`, { active }); } catch {} setTimeout(() => loadMonitors(), 500); }
async function deleteMonitor(id) { if (!confirm('Delete this monitor?')) return; try { await api('DELETE', `/monitors/${id}`); } catch {} setTimeout(() => loadMonitors(), 500); }

function router() {
  const hash = location.hash.slice(1) || 'home';
  const [view, ...params] = hash.split('/');
  const viewEl = document.getElementById('view-content');
  if (!viewEl) return;
  viewEl.innerHTML = '<div class="spinner" style="margin:40px auto"></div>';
  const fn = views[view];
  if (fn) { fn(viewEl, params).catch(e => { viewEl.innerHTML = `<div class="empty"><i class="fas fa-exclamation-triangle"></i> Error loading view: ${e.message}</div>`; }); }
  else { viewEl.innerHTML = `<div class="empty"><i class="fas fa-compass"></i> View not found: ${view}</div>`; }
}

window.addEventListener('hashchange', router);
render();
